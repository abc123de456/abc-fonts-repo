<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Slide Generator</title>
<style>
  body {
    font-family: Arial, sans-serif;
    margin: 20px;
  }
  #controls {
    margin-bottom: 20px;
  }
  #prev-text {
    width: 60%;
    padding: 8px;
    font-size: 16px;
  }
  #categorySelect {
    margin-left: 10px;
    padding: 8px;
    font-size: 16px;
  }
  #slidesContainer {
    border: 1px solid #ccc;
    padding: 10px;
    min-height: 200px;
  }
  .slide {
    padding: 10px;
    margin-bottom: 10px;
    background-color: #e0e0e0;
    border-radius: 4px;
  }
</style>
</head>
<body>

<h1>Slide Generator</h1>

<div id="controls">
  <input type="text" id="prev-text" placeholder="Type slide text and press Enter" />
  <select id="categorySelect">
    <option value="all" selected>All categories</option>
    <option value="ancient">Ancient Civilisations</option>
    <option value="sans-serif">Sans-serif</option>
    <option value="serif">Serif</option>
    <option value="display">Display</option>
    <option value="handwriting">Handwriting</option>
    <option value="monospace">Monospace</option>
  </select>
</div>

<div id="slidesContainer">
  <!-- Slides will appear here -->
</div>

<script>
  const input = document.getElementById('prev-text');
  const container = document.getElementById('slidesContainer');
  const categorySelect = document.getElementById('categorySelect');

  // Function to add new slide
  function addSlide() {
    const text = input.value.trim();
    if (text === "") return; // Ignore empty input

    const category = categorySelect.value;

    const slide = document.createElement('div');
    slide.className = 'slide';

    // Display category and slide text
    slide.innerHTML = `<strong>Category:</strong> ${category}<br>${text}`;

    container.appendChild(slide);
  }

  // Add slide on Enter key press
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      addSlide();
      input.value = ""; // Optional: clear input
    }
  });
</script>

</body>
</html>
